services:
  pipelineguard:
    build: .
    container_name: pipelineguard
    ports:
      - "127.0.0.1:3002:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
